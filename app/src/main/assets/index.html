<script>
const DEFAULT_PROJECT={name:'Colox 色库',base_url:'https://filemanagerauth-d5fmy6cv843c4a56-1419081389.ap-shanghai.app.tcloudbase.com',admin_token:'CHANGE_ME_TO_A_LONG_RANDOM_ADMIN_TOKEN',users_path:'/cox/admin/users',action_path:'/cox/admin/action'};

// 阻止 WebView 把导航栏、按钮、列表文字当成网页内容选中；输入框仍可正常编辑。
document.addEventListener('contextmenu', function(e){

function load(){let c={password:'',current_project:'Colox 色库',projects:[DEFAULT_PROJECT]};try{let old=localStorage.getItem(LS)||localStorage.getItem('colox_admin_mobile_v1')||'';if(old)c=Object.assign(c,JSON.parse(old));}catch(e){}if(!Array.isArray(c.projects)||!c.projects.length)c.projects=[DEFAULT_PROJECT];if(!c.current_project)c.current_project=c.projects[0].name;state.config=c;state.authed=false;}
function save(){localStorage.setItem(LS,JSON.stringify(state.config));}
function encodePwd(p){try{return btoa(unescape(encodeURIComponent(String(p||''))));}catch(e){return '';}}
function decodePwd(p){try{return decodeURIComponent(escape(atob(String(p||''))));}catch(e){return '';}}
function savedPwd(){return decodePwd(localStorage.getItem(REMEMBER_PWD_LS)||'');}
function setRememberPassword(on,pwd){if(on)localStorage.setItem(REMEMBER_PWD_LS,encodePwd(pwd));else localStorage.removeItem(REMEMBER_PWD_LS);}
function rememberCheckedAttr(){return savedPwd()?' checked':'';}
function savedPwdValue(){return esc(savedPwd());}
function project(){let ps=state.config.projects||[];return ps.find(p=>p.name===state.config.current_project)||ps[0]||null;}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
function toast(t){let el=document.getElementById('toast');el.textContent=t;el.style.display='block';setTimeout(()=>el.style.display='none',2200);try{AndroidBridge.vibrate(45)}catch(e){}}
function pad2(n){return String(n).padStart(2,'0');}
function parseBeijingParts(v){let s=String(v||'').trim();if(!s||s==='-'||s==='永久')return null;s=s.replace(/\//g,'-').replace('T',' ').replace(/Z$/,'').trim();if(s.indexOf('.')>=0)s=s.split('.')[0];let m=s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})(?:\s+(\d{1,2})(?::(\d{1,2}))?(?::(\d{1,2}))?)?$/);if(!m)return null;return {y:Number(m[1]),mo:Number(m[2]),d:Number(m[3]),h:Number(m[4]||0),mi:Number(m[5]||0),se:Number(m[6]||0)};}
function formatPartsBJ(p){if(!p)return '';return `${p.y}-${pad2(p.mo)}-${pad2(p.d)} ${pad2(p.h)}:${pad2(p.mi)}`;}
function isTzTimeString(s){s=String(s||'').trim();return /(?:Z|[+-]\d{2}:?\d{2})$/.test(s);}
function beijingMsFromParts(p){return Date.UTC(p.y,p.mo-1,p.d,p.h-8,p.mi,p.se||0,0);}
function beijingPartsFromMs(ms){let d=new Date(ms+8*3600000);return {y:d.getUTCFullYear(),mo:d.getUTCMonth()+1,d:d.getUTCDate(),h:d.getUTCHours(),mi:d.getUTCMinutes(),se:d.getUTCSeconds()};}
function fmt(v){let s=String(v||'').trim();if(!s)return '-';if(s==='永久')return '永久';try{if(/^\d{10,13}$/.test(s)){let n=Number(s);if(n>10000000000)n=Math.floor(n/1000);return formatPartsBJ(beijingPartsFromMs(n*1000));}if(isTzTimeString(s)){let d=new Date(s.replace(' ','T'));if(!isNaN(d.getTime()))return formatPartsBJ(beijingPartsFromMs(d.getTime()));}let p=parseBeijingParts(s);if(p)return formatPartsBJ(p);}catch(e){}return s.replace('T',' ').replace('Z','').split('.')[0].slice(0,16);}
function beijingInputToCloudValue(v){let p=parseBeijingParts(v);if(!p)return String(v||'').trim();return new Date(beijingMsFromParts(p)).toISOString();}
function expireTimestamp(v){let f=fmt(v);if(!f||f==='-'||f==='永久')return null;let p=parseBeijingParts(f);if(!p)return null;return beijingMsFromParts(p);}
function isExpiredTime(v){if(String(v||'').trim()==='永久')return false;let ms=expireTimestamp(v);if(ms===null)return false;return Date.now()>=ms;}
function remainText(v){if(String(v||'').trim()==='永久')return '永久';let ms=expireTimestamp(v);if(ms===null)return '-';let diff=ms-Date.now();if(diff<=0)return '已过期';let mins=Math.ceil(diff/60000);if(mins<60)return '剩余'+mins+'分钟';let hours=Math.ceil(diff/3600000);if(hours<24)return '剩余'+hours+'小时';let ds=Math.ceil(diff/86400000);return '剩余'+ds+'天';}
function remainShort(v){let t=remainText(v);return t.indexOf('剩余')===0?t.slice(2):t;}
function days(v){let t=remainText(v);if(t==='永久'||t==='-'||t==='已过期')return t==='已过期'?'0':t;let m=t.match(/(\d+)/);if(!m)return '-';if(t.includes('天'))return m[1];return '0';}
function level(u){let m=String(u.member_status||'').trim();let plan=String(u.member_plan||'').toLowerCase().trim();let p=String(u.member_permanent||'').trim();let expired=isExpiredTime(u.member_expire_at);let hasExpire=expireTimestamp(u.member_expire_at)!==null;if(u.status==='disabled'||u.status==='已禁用'||m.includes('禁用'))return ['已禁用','expired'];if(m.includes('永久')||p==='1'||p==='true'||p==='是'||u.member_expire_at==='永久')return ['永久版','perm'];if(m.includes('试用')||plan==='trial')return [expired?'已过期':'试用版',expired?'expired':'trial'];if(m.includes('专业')||plan==='pro'||(m.includes('过期')&&hasExpire))return [expired?'已过期':'专业版',expired?'expired':'pro'];if(m.includes('过期')&&!hasExpire)return ['已过期','expired'];return ['免费版','free'];}

function normalizeUsers(data){if(Array.isArray(data))return data;let arr=data.users||data.data||data.list||data.items||[];return Array.isArray(arr)?arr:[];}
function apiUrl(kind){let p=project();if(!p)throw new Error('请先添加项目');let base=String(p.base_url||'').replace(/\/$/,'');let path=p[kind==='users'?'users_path':'action_path']||'';if(!path.startsWith('/'))path='/'+path;return base+path;}
let __nativePostSeq=1;
let __nativePostCallbacks={};
window.__nativePostJsonCallback=function(id,text){
  let cb=__nativePostCallbacks[id];
  if(!cb)return;
  delete __nativePostCallbacks[id];
  cb(text||'');
};
function hasNativeBridge(){
  try{return !!(window.AndroidBridge&&AndroidBridge.ping&&AndroidBridge.ping()==='ok');}catch(e){return false;}
}
function parseCloudResponse(text){
  try{return JSON.parse(text)}catch(e){return {ok:false,message:'云端返回不是 JSON：'+String(text).slice(0,260),error:'云端返回不是 JSON：'+String(text).slice(0,260)}}
}
function post(url,payload){
  let body=JSON.stringify(payload||{});
  if(hasNativeBridge()){
    return new Promise((resolve)=>{
      let id='cb_'+Date.now()+'_'+(__nativePostSeq++);
      let done=false;
      __nativePostCallbacks[id]=function(text){
        done=true;
        resolve(parseCloudResponse(text));
      };
      try{
        AndroidBridge.postJson(id,url,body);
        setTimeout(()=>{
          if(!done&&__nativePostCallbacks[id]){
            delete __nativePostCallbacks[id];
            resolve({ok:false,message:'连接云端超时，请检查手机网络或后台地址。',error:'连接云端超时，请检查手机网络或后台地址。'});
          }
        },26000);
      }catch(e){
        delete __nativePostCallbacks[id];
        try{
          let text=AndroidBridge.postJsonSync(url,body);
          resolve(parseCloudResponse(text));
        }catch(e2){
          resolve({ok:false,message:'Android 原生请求调用失败：'+String(e2.message||e2),error:'Android 原生请求调用失败：'+String(e2.message||e2)});
        }
      }
    });
  }
  return fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body}).then(r=>r.text()).then(parseCloudResponse).catch(e=>({ok:false,message:'浏览器预览无法连接云端：'+String(e.message||e)+'。请打包安装 APK 测试，或给云函数添加 CORS 响应头。',error:'浏览器预览无法连接云端：'+String(e.message||e)}));
}
function apiMessage(data,def){return (data&&(data.message||data.error||data.msg))||def;}
function showAlert(title,message,type='ok',onOk){currentModal={type:'alert',onOk};let cls=type==='error'?'err':(type==='warn'?'warn':'ok');let icon=type==='error'?'×':(type==='warn'?'!':'✓');document.getElementById('sheet').innerHTML=`<div class="modalIcon ${cls}">${icon}</div><h3>${esc(title)}</h3><p>${esc(message)}</p><div class="rowBtns"><button class="primary" onclick="modalOk()">确定</button></div>`;openModal();}
function showConfirm(title,message,onConfirm,danger=false){currentModal={type:'confirm',onConfirm};document.getElementById('sheet').innerHTML=`<div class="modalIcon ${danger?'err':'warn'}">${danger?'!':'?'}</div><h3>${esc(title)}</h3><p>${esc(message)}</p><div class="rowBtns"><button class="ghost" onclick="closeModal()">取消</button><button class="${danger?'ghost dangerBtn':'primary'}" onclick="modalConfirm()">确定</button></div>`;openModal('center');}
function showForm(title,subtitle,fields,onSubmit,confirmText='保存'){currentModal={type:'form',fields,onSubmit};let html=`<h3>${esc(title)}</h3>${subtitle?`<p>${esc(subtitle)}</p>`:''}`;fields.forEach(f=>{html+=`<div class="field"><div class="label">${esc(f.label||f.name)}${f.required?' *':''}</div>`;let val=esc(f.value||'');let ac=esc(f.autocomplete||(f.type==='password'?'new-password':'off'));if(f.textarea)html+=`<textarea id="mf_${esc(f.name)}" autocomplete="${ac}" placeholder="${esc(f.placeholder||'')}">${val}</textarea>`;else html+=`<input class="inp" id="mf_${esc(f.name)}" type="${esc(f.type||'text')}" value="${val}" placeholder="${esc(f.placeholder||'')}" autocomplete="${ac}" autocapitalize="off" spellcheck="false">`;html+=`</div>`});html+=`<div class="rowBtns"><button class="ghost" onclick="closeModal()">取消</button><button class="primary" onclick="modalSubmit()">${esc(confirmText)}</button></div>`;document.getElementById('sheet').innerHTML=html;openModal();setTimeout(()=>{let first=document.querySelector('#sheet input,#sheet textarea');if(first)first.focus();},80);}
function openModal(mode){let m=document.getElementById('modal');m.classList.toggle('center',mode==='center');m.style.display='flex';}
function closeModal(){let m=document.getElementById('modal');let s=document.getElementById('sheet');m.style.display='none';m.classList.remove('center');if(s)s.classList.remove('projectSwitchSheet');currentModal=null;}
function modalOk(){let cb=currentModal&&currentModal.onOk;closeModal();if(cb)cb();}
function modalConfirm(){let cb=currentModal&&currentModal.onConfirm;closeModal();if(cb)cb();}

function userRegisterTime(u){return u.registered_at||u.created_at||u.register_time||u.created_time||u.create_at||u.createdAt||'';}
function userRegisterText(u){return fmt(userRegisterTime(u))||'-';}
function userRegisterDate(u){let raw=userRegisterTime(u);if(!raw)return null;let d=new Date(String(raw).trim().replace(' ','T'));return isNaN(d.getTime())?null:d;}
function isSameDay(a,b){return a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();}
function weekStartDate(base){let d=new Date(base);d.setHours(0,0,0,0);d.setDate(d.getDate()-((d.getDay()+6)%7));return d;}
function isUserNewToday(u){let d=userRegisterDate(u);return !!d&&isSameDay(d,new Date());}
function isUserNewThisWeek(u){let d=userRegisterDate(u);if(!d)return false;let now=new Date();let start=weekStartDate(now);return d>=start&&d<=now;}
function isUserNewThisMonth(u){let d=userRegisterDate(u);let now=new Date();return !!d&&d.getFullYear()===now.getFullYear()&&d.getMonth()===now.getMonth();}
function newUserStats(users){let today=0,week=0,month=0;users.forEach(u=>{if(isUserNewToday(u))today++;if(isUserNewThisWeek(u))week++;if(isUserNewThisMonth(u))month++;});return {today,week,month};}
function stats(){let total=state.users.length,pro=0,perm=0,trial=0,online=0,free=0,disabled=0,expired=0;state.users.forEach(u=>{let l=level(u)[0];if(l==='永久版')perm++;else if(l==='专业版')pro++;else if(l==='试用版')trial++;else if(l==='免费版')free++;else if(l==='已过期')expired++;if(u.status==='disabled'||u.status==='已禁用')disabled++;if(isOnline(u))online++;});return Object.assign({total,pro,perm,trial,online,free,disabled,expired},newUserStats(state.users));}

function applyFilter(doRender=true){let q=(state.query||'').toLowerCase().trim();state.filtered=state.users.filter(u=>{let hay=[u.account,u.email,u.uid].join(' ').toLowerCase();if(q&&!hay.includes(q))return false;let l=level(u)[0];let f=state.filter||'全部';if(f==='全部')return true;if(f==='今日新增')return isUserNewToday(u);if(f==='本周新增')return isUserNewThisWeek(u);if(f==='本月新增')return isUserNewThisMonth(u);if(f==='在线设备')return isOnline(u);if(f==='已禁用')return u.status==='disabled'||u.status==='已禁用';if(f==='已过期')return l==='已过期';return l===f;});if(doRender)render();}

function objVal(v){if(!v)return {};if(typeof v==='object')return v;try{let o=JSON.parse(v);return o&&typeof o==='object'?o:{};}catch(e){return {};}}
function coreDetail(u){u=u||{};let d=objVal(u.computer_core_detail);let cur=objVal(u.current_device_detail||u.device_detail);function pick(...xs){for(let x of xs){if(x!==undefined&&x!==null&&String(x).trim()!==''&&String(x)!=='0')return x;}return '';}
  let win=normalizeWindowsVersion(d,cur);
  let online=onlineText(u,d,cur);
  return {
    device_name:pick(d.device_name,u.current_device_name,u.current_login_device,cur.device_name),
    online_status:online,
    online_code:pick(u.online_status_code,''),
    last_seen_at:latestClientActivityValue(u,d,cur),
    windows_version:win,
    cpu_name:pick(d.cpu_name,cur.cpu_name,cur.processor),
    ram_gb:pick(d.ram_gb,cur.ram_gb),
    gpu_name:pick(d.gpu_name,cur.gpu_name),
    client_time:pick(d.client_time,cur.client_time),
    machine_code:pick(d.machine_code,u.current_machine_code,cur.machine_code),
    username:pick(d.username,cur.username)
  };
}
function parseOnlineTime(v){let s=String(v||'').trim();if(!s||s==='-'||s==='永久')return null;try{if(/^\d{10,13}$/.test(s)){let n=Number(s);if(n>10000000000)n=Math.floor(n/1000);return new Date(n*1000);}}catch(e){}
  try{if(isTzTimeString(s)){let d=new Date(s.replace(' ','T'));if(!isNaN(d.getTime()))return d;}}
  catch(e){}
  try{let p=parseBeijingParts(s);if(p)return new Date(beijingMsFromParts(p));}catch(e){}
  return null;
}
const ONLINE_TIMEOUT_MINUTES=70;
function heartbeatTimeCandidates(u,d,cur){
  u=u||{};
  d=d||objVal(u.computer_core_detail);
  cur=cur||objVal(u.current_device_detail||u.device_detail);
  // 在线状态只认客户端心跳时间。
  // 不使用 updated_at / session_updated_at / client_time / login_at / status 等后台操作会改变的字段。
  return [
    u.last_seen_at,d.last_seen_at,cur.last_seen_at,
    u.heartbeat_at,d.heartbeat_at,cur.heartbeat_at,
    u.last_heartbeat_at,d.last_heartbeat_at,cur.last_heartbeat_at,
    u.last_ping_at,d.last_ping_at,cur.last_ping_at
  ];
}
function latestClientActivityEntry(u,d,cur){let latest=null,best='';heartbeatTimeCandidates(u,d,cur).forEach(v=>{let dt=parseOnlineTime(v);if(dt&&(!latest||dt>latest)){latest=dt;best=v;}});return {time:latest,value:best};}
function latestClientActivityValue(u,d,cur){return latestClientActivityEntry(u,d,cur).value||'';}
function inferOnlineByTime(u,d,cur){let latest=latestClientActivityEntry(u,d,cur).time;if(!latest)return '离线';let min=(Date.now()-latest.getTime())/60000;return min>=-5&&min<=ONLINE_TIMEOUT_MINUTES?'在线':'离线';}
function onlineText(u,d,cur){return inferOnlineByTime(u,d,cur)==='在线'?'在线':'离线';}
function onlineClass(u){return onlineText(u)==='在线'?'online':'offline';}
function isOnline(u){return onlineClass(u)==='online';}
function windowsBuildFromText(){for(let i=0;i<arguments.length;i++){let s=String(arguments[i]||'');if(!s)continue;let m=s.match(/10\.0\.(\d{4,6})/);if(m)return Number(m[1]);m=s.match(/(?:build|版本|内部版本|OS Build)\D*(\d{4,6})/i);if(m)return Number(m[1]);}return 0;}
function normalizeWindowsVersion(core,cur){core=core||{};cur=cur||{};let raw=[core.windows_version,cur.windows_version,cur.os_version,cur.platform,cur.os_build,cur.build_number,cur.build].filter(Boolean).join(' ');let build=windowsBuildFromText(raw);if(build>=26100)return 'Windows 11 24H2 / 10.0.'+build;if(build>=22631)return 'Windows 11 23H2 / 10.0.'+build;if(build>=22621)return 'Windows 11 22H2 / 10.0.'+build;if(build>=22000)return 'Windows 11 21H2 / 10.0.'+build;if(build>=19045)return 'Windows 10 22H2 / 10.0.'+build;if(build>=19044)return 'Windows 10 21H2 / 10.0.'+build;if(build>=19043)return 'Windows 10 21H1 / 10.0.'+build;if(build>=19042)return 'Windows 10 20H2 / 10.0.'+build;if(build>=10240)return 'Windows 10 / 10.0.'+build;
  let osName=String(cur.os_name||core.os_name||'').trim();let rel=String(cur.os_release||core.os_release||'').trim();let ver=String(cur.os_version||core.os_version||'').trim();let explicit=String(core.windows_version||cur.windows_version||'').trim();let joined=[osName,rel,ver].filter(Boolean).join(' / ');let detect=(explicit+' '+joined+' '+raw).toLowerCase();if(/windows\s*xp|\b5\.1\b/.test(detect))return 'Windows XP'+(ver?' / '+ver:'');if(/windows\s*7|\b6\.1\b/.test(detect))return 'Windows 7'+(ver?' / '+ver:'');if(/windows\s*8\.1|\b6\.3\b/.test(detect))return 'Windows 8.1'+(ver?' / '+ver:'');if(/windows\s*8|\b6\.2\b/.test(detect))return 'Windows 8'+(ver?' / '+ver:'');return explicit||joined||'-';}

function historyItems(u){let h=objVal({});let arr=u&&u.device_history;if(typeof arr==='string'){try{arr=JSON.parse(arr)}catch(e){arr=[]}}if(!Array.isArray(arr))arr=[];return arr.slice(0,5).map((it,i)=>{it=it||{};let name=it.device_name||it.current_device_name||it.machine_code||'未知设备';let t=it.seen_at||it.login_at||it.last_seen_at||it.client_time||'';let st=it.online_status||'';return `<div class="historyItem"><b>${i+1}. ${esc(name)}</b><div class="small muted">${esc(shortDate(t))}${st?'　'+esc(st):''}</div></div>`;}).join('')||'<div class="small muted">暂无设备历史</div>';}

function opsHtml(){let u=state.selected;if(!u)return usersHtml();let uid=u.uid||'';let items=[['♛','设专业版',`setPro('${esc(uid)}')`],['💎','永久版',`confirmAct('set_permanent','${esc(uid)}','确定将该用户设为永久专业版？')`],['📅','改到期',`updateExpire('${esc(uid)}')`],['🆓','免费版',`confirmAct('set_free','${esc(uid)}','确定将该用户设为免费版？')`],['🔑','改密码',`updatePassword('${esc(uid)}')`],['🚪','踢下线',`confirmAct('kick_session','${esc(uid)}','确定踢下线该用户？')`],['⛔','禁用',`confirmAct('disable_user','${esc(uid)}','确定禁用该账号？',true)`],['✅','启用',`confirmAct('enable_user','${esc(uid)}','确定启用该账号？')`],['🔄','重置试用',`confirmAct('reset_trial','${esc(uid)}','确定重置试用状态？')`],['📝','备注',`updateRemark('${esc(uid)}')`],['🗑️','删除',`deleteUser('${esc(uid)}')`],['⧉','复制诊断',`copyText(fullUserText(state.selected),'诊断信息')`]];return shell('用户操作',`<div class="card detailHead"><div class="bigAvatar">${esc(String(u.account||'?').slice(0,1))}</div><div><h3 style="margin:0 0 6px">${esc(u.account||'-')}</h3><div class="small muted">${esc(uid||'-')}</div></div></div><div class="actions">${items.map(a=>`<button class="act" onclick="${a[2]}"><i>${a[0]}</i>${a[1]}</button>`).join('')}</div><button class="ghost" style="width:100%;margin-top:14px" onclick="state.tab='detail';render()">返回详情</button>`);}
async function runAction(action,uid,extra){let p=project();if(!p){showAlert('暂无项目','请先添加项目配置。','warn');return;}try{let payload=Object.assign({admin_token:p.admin_token,action,uid},extra||{});let data=await Promise.resolve(post(apiUrl('action'),payload));if(data&&data.ok===false)throw new Error(apiMessage(data,'操作失败'));await reloadUsersAfterAction(uid);showAlert('操作成功',apiMessage(data,'操作成功。'),'ok');}catch(e){showAlert('操作失败',String(e.message||e),'error');}}
function setPro(uid){showForm('设为专业版','请输入会员天数。',[{name:'days',label:'会员天数',value:'30',type:'number',required:true}],v=>runAction('set_pro',uid,{days:parseInt(v.days)||30}),'确定');}
function updateExpire(uid){let u=state.selected||{};let current=u.member_expire_at==='永久'?'':(fmt(u.member_expire_at)||'');showForm('修改到期时间','统一按北京时间填写，例如：2026-06-30 23:59',[{name:'expire_at',label:'到期时间',value:current==='-'?'':current,placeholder:'2026-06-30 23:59',required:true}],v=>{let bj=fmt(v.expire_at);if(!bj||bj==='-'){showAlert('时间格式不正确','请按北京时间格式填写：2026-06-30 23:59','warn');return;}runAction('update_expire',uid,{expire_at:beijingInputToCloudValue(bj)});},'保存');}
function updatePassword(uid){showForm('修改用户密码','请输入新的登录密码，至少 6 位。',[{name:'password',label:'新密码',type:'password',required:true}],v=>{if(v.password.length<6){showAlert('密码太短','用户密码至少 6 位。','warn');return;}runAction('update_password',uid,{password:v.password});},'保存');}
function updateRemark(uid){let u=state.selected||{};showForm('修改备注','备注会同步保存到云端。',[{name:'remark',label:'备注',value:u.remark||'',textarea:true,placeholder:'请输入备注'}],v=>runAction('update_remark',uid,{remark:v.remark}),'保存');}
function confirmAct(action,uid,msg,danger=false){showConfirm('确认操作',msg,()=>runAction(action,uid,{}),danger);}
function deleteUser(uid){showConfirm('删除用户','确定删除此用户吗？此操作不可恢复。',()=>runAction('delete_user',uid,{}),true);}
function createUser(){showForm('新增账号','后台创建账号后，用户即可登录软件。',[{name:'account',label:'账号（手机号 / 邮箱 / 昵称）',value:'',autocomplete:'off',required:true},{name:'password',label:'密码',type:'password',value:'',autocomplete:'new-password',required:true},{name:'password2',label:'确认密码',type:'password',value:'',autocomplete:'new-password',required:true}],v=>{if(v.password.length<6){showAlert('密码太短','密码至少 6 位。','warn');return;}if(v.password!==v.password2){showAlert('确认失败','两次输入的密码不一致。','warn');return;}runAction('create_user','',{account:v.account,password:v.password});},'创建账号');}
function projectsHtml(){let ps=state.config.projects||[];let body=ps.map((p,i)=>`<div class="card project"><div style="min-width:0"><h3 style="margin:0 0 7px">${esc(p.name)}</h3><div class="small muted">${esc(p.base_url)}</div><div class="small muted">${esc(p.users_path)} ｜ ${esc(p.action_path)}</div><div class="small" style="margin-top:8px;color:${p.name===state.config.current_project?'#16a765':'#6b7280'}">${p.name===state.config.current_project?'当前项目':'点击编辑可设为当前项目'}</div></div><div><button class="ghost mini" onclick="editProject(${i})">编辑</button><button class="ghost mini dangerBtn" style="margin-top:6px" onclick="delProject(${i})">删除</button></div></div>`).join('')||'<div class="card emptyCard"><div class="emptyIcon">▣</div><b>暂无项目</b></div>';return shell('项目管理',`${body}<button class="primary" onclick="editProject(-1)">添加新项目</button>`);}
function editProject(i){let ps=state.config.projects||[];let p=i>=0?ps[i]:{name:'新项目',base_url:'https://',admin_token:'',users_path:'/cox/admin/users',action_path:'/cox/admin/action',remark:''};showForm(i>=0?'编辑项目':'添加项目','一次性填写全部项目配置，不再逐个弹窗。',[{name:'name',label:'软件名称',value:p.name||'',placeholder:'例如：Colox 色库',required:true},{name:'base_url',label:'后台地址',value:p.base_url||'',placeholder:'https://xxxx.tcloudbase.com',required:true},{name:'users_path',label:'读取用户接口',value:p.users_path||'/cox/admin/users',required:true},{name:'action_path',label:'执行操作接口',value:p.action_path||'/cox/admin/action',required:true},{name:'admin_token',label:'后台访问密钥 Admin Token',value:p.admin_token||'',placeholder:'请输入后台访问密钥',required:true},{name:'remark',label:'备注（可选）',value:p.remark||'',textarea:true,placeholder:'请输入备注'}],v=>{let np={name:v.name,base_url:v.base_url.replace(/\/$/,''),users_path:v.users_path.startsWith('/')?v.users_path:'/'+v.users_path,action_path:v.action_path.startsWith('/')?v.action_path:'/'+v.action_path,admin_token:v.admin_token,remark:v.remark};if(i>=0)ps[i]=np;else ps.push(np);state.config.projects=ps;state.config.current_project=np.name;save();state.users=[];state.filtered=[];toast('项目已保存');render();},'保存项目');}
function delProject(i){showConfirm('删除项目','确定删除此项目配置吗？不会删除云端用户数据。',()=>{let ps=state.config.projects||[];ps.splice(i,1);state.config.projects=ps;state.config.current_project=ps[0]?.name||'';save();state.users=[];state.filtered=[];render();},true);}
function openProjectSwitch(){let ps=state.config.projects||[];let current=state.config.current_project||'';let list=ps.map((p,i)=>{let isCur=p.name===current;let icon=String(p.name||'?').slice(0,1).toUpperCase();return `<button class="projectChoice ${isCur?'current':''}" onclick="switchProject(${i})"><span class="projectChoiceIcon ${i%2?'alt':''}">${esc(icon)}</span><span class="projectChoiceName">${esc(p.name)}</span>${isCur?'<span class="projectCurrentBadge">当前</span>':''}<span class="projectChoiceMark">${isCur?'✓':''}</span></button>`;}).join('')||'<div class="emptyCard"><div class="emptyIcon">▣</div><b>暂无项目</b></div>';let html=`<div class="projectSwitchBox"><h3>切换后台</h3><p>选择当前要管理的软件后台</p><div class="projectSwitchList">${list}</div><div class="projectSwitchActions"><button class="projectManageBtn" onclick="closeModal();go('projects')">管理项目 <span class="projectGear">⚙</span></button><button class="projectCancelBtn" onclick="closeModal()">取消</button></div></div>`;let sheet=document.getElementById('sheet');sheet.innerHTML=html;sheet.classList.add('projectSwitchSheet');openModal('center');}
function switchProject(i){let p=(state.config.projects||[])[i];if(!p)return;state.config.current_project=p.name;save();state.users=[];state.filtered=[];closeModal();state.tab='dash';render();refresh();}
function meHtml(){return shell('我的',`<div class="card"><h3>本机设置</h3><div class="kv"><span>当前项目</span><span>${esc(project()?.name||'无')}</span></div><div class="kv"><span>本机密码</span><span>${state.config.password?'已设置':'未设置'}</span></div><div class="kv"><span>请求通道</span><span>${hasNativeBridge()?'Android 原生 POST':'浏览器 fetch 预览'}</span></div><div class="kv"><span>记住密码</span><span>${savedPwd()?'已保存':'未保存'}</span></div></div><button class="ghost" style="width:100%;margin-bottom:10px" onclick="changePwd()">修改管理密码</button><button class="ghost dangerBtn" style="width:100%;margin-bottom:10px" onclick="logout()">锁定后台</button><button class="ghost dangerBtn" style="width:100%" onclick="resetAll()">清空本机配置</button><div class="card small muted" style="margin-top:16px">说明：此手机版基于 Android WebView 模板制作。项目配置保存在手机本机，云端接口仍使用原来的 users_path / action_path。</div>`);}
function changePwd(){showForm('修改管理密码','请输入新的本机后台密码。',[{name:'password',label:'新管理密码',type:'password',required:true},{name:'password2',label:'确认密码',type:'password',required:true}],v=>{if(v.password.length<6){showAlert('密码太短','管理密码至少 6 位。','warn');return;}if(v.password!==v.password2){showAlert('确认失败','两次输入的密码不一致。','warn');return;}state.config.password=v.password;save();if(savedPwd())setRememberPassword(true,v.password);showAlert('修改成功','管理密码已修改。','ok');},'保存');}
function logout(){state.authed=false;render();}
function resetAll(){showConfirm('清空配置','确定清空本机项目配置和管理密码吗？',()=>{localStorage.removeItem(LS);localStorage.removeItem('colox_admin_mobile_v1');localStorage.removeItem(REMEMBER_PWD_LS);localStorage.removeItem('colox_admin_mobile_remember_login');load();state.authed=false;state.users=[];state.filtered=[];render();},true);}
function render(){let app=document.getElementById('app');if(!state.config)load();if(!state.authed){app.innerHTML=loginHtml();return;}if(state.tab==='dash')app.innerHTML=dashHtml();else if(state.tab==='users')app.innerHTML=usersHtml();else if(state.tab==='detail')app.innerHTML=detailHtml();else if(state.tab==='ops')app.innerHTML=opsHtml();else if(state.tab==='projects')app.innerHTML=projectsHtml();else app.innerHTML=meHtml();}
window.appBack=function(){if(document.getElementById('modal').style.display==='flex'){closeModal();return true;}if(state.tab==='ops'){state.tab='detail';render();return true;}if(state.tab==='detail'){returnFromDetail();return true;}if(state.tab!=='dash'){state.tab='dash';render();return true;}return false;};

  if(!value || value==='-') return '';
  let safe=String(value).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
  return `<button class="copySmall2" onclick="event.stopPropagation();copyText('${esc(safe)}','${esc(label||'内容')}')">复制</button>`;
}

    ${sectionItem2('trial','⌛','试用信息','试用状态、开始时间、到期时间')}
    ${sectionItem2('history','🕘','设备历史','最近登录过的设备记录')}
    ${sectionItem2('ops','⚙️','操作管理','会员操作、账号操作、数据操作')}
  </div>`;
  return detailShell2('用户详情',body);
}
function detailSectionPage2(u,key){
  let [txt,cls]=level(u), c=coreDetail(u), d=days(u.member_expire_at), uid=u.uid||'';
  let title='用户详情', body='';
  if(key==='account'){
    title='账号信息';
    body=`<div class="subCard2">${infoRow2('账号',u.account,true)}${infoRow2('邮箱',u.email||'-',!!u.email)}${infoRow2('密码',u.password||'-',!!u.password)}${infoRow2('UID',u.uid,true)}${infoRow2('注册时间',userRegisterText(u))}${infoRow2('账号状态',u.status||'正常')}${infoRow2('登录次数',u.login_count||'0')}${infoRow2('备注',u.remark||'-')}</div>`;
  }else if(key==='member'){
    title='会员信息';
    body=`<div class="subCard2">${infoRow2('会员状态',u.member_status||txt)}${infoRow2('套餐',u.member_plan||'-')}${infoRow2('到期时间',fmt(u.member_expire_at)||'-')}${infoRow2('剩余时间',remainText(u.member_expire_at))}${infoRow2('是否永久',(u.member_permanent||u.member_expire_at==='永久')?'是':'否')}${infoRow2('激活码',u.member_code||'-',!!u.member_code)}${infoRow2('激活时间',fmt(u.member_activated_at)||'-')}${infoRow2('最后登录',fmt(u.last_login_at)||'-')}</div>`;
  }else if(key==='computer'){
    title='电脑详情';
    body=`<div class="subCard2">${infoRow2('电脑名称',c.device_name||'-')}${infoRow2('在线状态',onlineText(u)||'-')}${infoRow2('最后活跃',fmt(c.last_seen_at)||'-')}${infoRow2('Windows版本',c.windows_version||'-')}${infoRow2('CPU',c.cpu_name||'-')}${infoRow2('内存',c.ram_gb?c.ram_gb+'GB':'-')}${infoRow2('显卡',c.gpu_name||'-')}${infoRow2('客户端时间',fmt(c.client_time)||c.client_time||'-')}${infoRow2('机器码',c.machine_code||'-',!!c.machine_code)}${infoRow2('系统用户名',c.username||'-')}</div>`;
  }else if(key==='trial'){
    title='试用信息';
    body=`<div class="subCard2">${infoRow2('试用状态',u.trial_status||'-')}${infoRow2('试用开始',fmt(u.trial_started_at)||'-')}${infoRow2('试用到期',fmt(u.trial_expire_at)||'-')}${infoRow2('试用设备',u.trial_device_name||'-')}${infoRow2('试用机器码',u.trial_machine_code||'-',!!u.trial_machine_code)}${infoRow2('绑定时间',fmt(u.trial_machine_bound_at)||'-')}</div>`;
  }else if(key==='history'){
    title='设备历史';
    body=`<div class="subCard2">${historyList2(u)}</div>`;
  }else{
    title='操作管理';
    body=opsGroups2(uid);
  }
  return detailShell2(title,body,'<button class="plainIcon" onclick="openDetailMore2()">⚙</button>');
}
function historyList2(u){
  let arr=u&&u.device_history;
  if(typeof arr==='string'){try{arr=JSON.parse(arr)}catch(e){arr=[]}}
  if(!Array.isArray(arr)||!arr.length)return '<div class="small muted">暂无设备历史</div>';
  return arr.slice(0,8).map((it,i)=>{it=it||{};let name=it.device_name||it.current_device_name||it.machine_code||'未知设备';let t=it.seen_at||it.login_at||it.last_seen_at||it.client_time||'';return `<div class="historyRow2"><div class="historyIndex2">${i+1}</div><div><div class="historyName2">${esc(name)}</div><div class="historyTime2">${esc(shortDate(t)||'-')}</div></div></div>`;}).join('');
}
function opsGroups2(uid){
  return `<div class="opsGroup2"><h3>会员操作</h3><div class="opsGrid2"><button onclick="setPro('${esc(uid)}')">专业版</button><button class="green" onclick="confirmAct('set_permanent','${esc(uid)}','确定将该用户设为永久专业版？')">永久</button><button class="orange" onclick="updateExpire('${esc(uid)}')">改到期</button><button onclick="confirmAct('set_free','${esc(uid)}','确定将该用户设为免费版？')">免费版</button></div></div><div class="opsGroup2"><h3>账号操作</h3><div class="opsGrid2"><button class="orange" onclick="updatePassword('${esc(uid)}')">改密码</button><button class="orange" onclick="confirmAct('kick_session','${esc(uid)}','确定踢下线该用户？')">踢下线</button><button class="green" onclick="confirmAct('enable_user','${esc(uid)}','确定启用该账号？')">启用</button><button class="red" onclick="confirmAct('disable_user','${esc(uid)}','确定禁用该账号？',true)">禁用</button><button class="orange" onclick="updateRemark('${esc(uid)}')">备注</button><button class="red" onclick="deleteUser('${esc(uid)}')">删除</button></div></div><div class="opsGroup2"><h3>数据操作</h3><div class="opsGrid2"><button class="purple" onclick="confirmAct('reset_trial','${esc(uid)}','确定重置试用状态？')">重置试用</button><button onclick="copyText(fullUserText(state.selected),'诊断信息')">复制诊断</button></div></div>`;
}
function detailHtml(){
  let u=state.selected;
  if(!u)return usersHtml();
  if(state.detailPane)return detailSectionPage2(u,state.detailPane);
  return detailHome2(u);
}
function userCard(u,i){
  // 用户管理页直接复用首页“最近用户”的紧凑列表 UI。
  // 功能逻辑不变：仍然打开同一个用户详情页，只把大卡片换成列表行。
  return recentLine(u,i);
}

function opsHtml(){
  let u=state.selected;
  if(!u)return usersHtml();
  state.detailPane='ops';
  return detailSectionPage2(u,'ops');
}
window.appBack=function(){
  if(document.getElementById('modal').style.display==='flex'){closeModal();return true;}
  if(state.tab==='detail'){
    if(state.detailPane){state.detailPane='';render();return true;}
    returnFromDetail();return true;
  }
  if(state.tab!=='dash'){state.tab='dash';render();return true;}
  return false;
};

load();render();
</script>
</body>
</html>
